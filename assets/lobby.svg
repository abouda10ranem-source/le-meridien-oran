<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2d4d"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3d5c"/>
      <stop offset="40%" stop-color="#1a2d4d"/>
      <stop offset="100%" stop-color="#0d1425"/>
    </linearGradient>
    <linearGradient id="chandelier" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#a88c4f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect x="0" y="420" width="800" height="180" fill="url(#floor)"/>
  <rect x="0" y="415" width="800" height="5" fill="#c9a96e22"/>
  <rect x="50" y="100" width="700" height="320" rx="8" fill="#152540"/>
  <rect x="70" y="120" width="320" height="280" rx="4" fill="#1d3050"/>
  <rect x="410" y="120" width="320" height="280" rx="4" fill="#1d3050"/>
  <rect x="50" y="80" width="700" height="3" fill="#c9a96e"/>
  <!-- Chandelier -->
  <line x1="400" y1="30" x2="400" y2="80" stroke="#c9a96e" stroke-width="2"/>
  <ellipse cx="400" cy="85" rx="80" ry="15" fill="url(#chandelier)" opacity="0.6"/>
  <ellipse cx="400" cy="85" rx="40" ry="8" fill="#c9a96e" opacity="0.4"/>
  <!-- Decor elements -->
  <ellipse cx="400" cy="95" rx="60" ry="5" fill="#c9a96e33"/>
  <rect x="150" y="140" width="80" height="12" rx="3" fill="#c9a96e22"/>
  <rect x="150" y="160" width="120" height="4" rx="2" fill="#c9a96e11"/>
  <rect x="450" y="140" width="80" height="12" rx="3" fill="#c9a96e22"/>
  <rect x="450" y="160" width="120" height="4" rx="2" fill="#c9a96e11"/>
  <text x="400" y="380" font-family="Georgia, serif" font-size="14" fill="#c9a96e88" text-anchor="middle">Grand Lobby</text>
</svg>