<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2d4d"/>
      <stop offset="100%" stop-color="#12203a"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a6e9e"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="bed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#d4c9b8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#wall)"/>
  <rect x="0" y="450" width="800" height="150" fill="#0d1425"/>
  <rect x="0" y="445" width="800" height="5" fill="#c9a96e33"/>
  <!-- Window -->
  <rect x="500" y="80" width="200" height="280" rx="4" fill="url(#window)"/>
  <rect x="500" y="80" width="200" height="280" rx="4" fill="none" stroke="#c9a96e44" stroke-width="3"/>
  <line x1="600" y1="80" x2="600" y2="360" stroke="#c9a96e33" stroke-width="2"/>
  <line x1="500" y1="220" x2="700" y2="220" stroke="#c9a96e33" stroke-width="2"/>
  <!-- Sea view through window -->
  <rect x="505" y="85" width="190" height="270" rx="2" fill="#1a3a5c66"/>
  <!-- Bed -->
  <rect x="100" y="340" width="350" height="200" rx="8" fill="url(#bed)"/>
  <rect x="100" y="320" width="350" height="30" rx="6" fill="#e8e0d0"/>
  <ellipse cx="200" cy="335" rx="60" ry="12" fill="#f5f0e8"/>
  <!-- Pillows -->
  <rect x="120" y="325" width="40" height="15" rx="5" fill="#faf7f2"/>
  <rect x="170" y="325" width="40" height="15" rx="5" fill="#faf7f2"/>
  <!-- Side tables -->
  <rect x="80" y="380" width="20" height="60" rx="2" fill="#2a3d5c"/>
  <rect x="75" y="375" width="30" height="8" rx="2" fill="#c9a96e44"/>
  <rect x="450" y="380" width="20" height="60" rx="2" fill="#2a3d5c"/>
  <rect x="445" y="375" width="30" height="8" rx="2" fill="#c9a96e44"/>
  <text x="400" y="550" font-family="Georgia, serif" font-size="14" fill="#c9a96e88" text-anchor="middle">Deluxe Sea View Room</text>
</svg>